<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSL 2026 — Who We're Seeing</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede6;
    --muted: #888;
    --overlap-bg: #211327;
    --overlap-border: #9b4bb5;
    --overlap-text: #d18be6;
    --triple-bg: #2a111b;
    --triple-border: var(--accent);
    --triple-text: var(--accent);
    --s1-bg: #1f1a0b;
    --s1-border: #b38a22;
    --s1-text: #f0c95a;
    --s2-bg: #131a2a;
    --s2-border: #2e4a8a;
    --s2-text: #7aaaf0;
    --s3-bg: #0e2018;
    --s3-border: #1e6040;
    --s3-text: #5ec98a;
    --maybe-bg: #1e1e1e;
    --maybe-border: #444;
    --maybe-text: #888;
    --accent: #d85f84;
  }

  html {
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    padding: 0 0 4rem;
    overflow-x: hidden;
  }

  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 6rem);
    letter-spacing: 0.02em;
    line-height: 0.9;
    color: var(--text);
  }

  header h1 .accent { color: var(--accent); }

  header p {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .container { max-width: 780px; margin: 0 auto; padding: 0 1.5rem; }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    color: inherit;
    font-family: inherit;
    text-align: left;
  }

  button.stat {
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    -webkit-tap-highlight-color: transparent;
  }

  button.stat:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.22);
  }

  button.stat[aria-pressed="true"] {
    transform: translateY(-1px);
    box-shadow: 0 0 0 3px rgba(208,181,255,0.35), 0 0 22px rgba(155,108,255,0.28), 0 10px 24px rgba(0,0,0,0.32);
  }

  .stat.triple {
    background: var(--triple-bg);
    border-color: var(--triple-border);
  }

  .stat.two-overlap {
    background: var(--overlap-bg);
    border-color: var(--overlap-border);
  }

  .stat.triple[aria-pressed="true"] {
    background: #3b1827;
    border-color: var(--triple-text);
  }

  .stat.two-overlap[aria-pressed="true"] {
    background: #2e1a38;
    border-color: var(--overlap-text);
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat.triple .stat-num { color: var(--triple-text); }
  .stat.two-overlap .stat-num { color: var(--overlap-text); }

  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  .legend {
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .leg-count { color: var(--text); font-weight: 600; }

  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .who-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
  }

  .who-label {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .who-btn {
    padding: 8px 16px;
    min-height: 40px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .who-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .who-btn.active { color: var(--text); border-color: rgba(255,255,255,0.25); background: var(--surface2); }
  .who-btn[data-user="1"].active { background: var(--s1-bg); border-color: var(--s1-border); color: var(--s1-text); }
  .who-btn[data-user="2"].active { background: var(--s2-bg); border-color: var(--s2-border); color: var(--s2-text); }
  .who-btn[data-user="3"].active { background: var(--s3-bg); border-color: var(--s3-border); color: var(--s3-text); }

  .edit-mode-toggle[aria-pressed="true"] {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e0e;
    font-weight: 600;
  }

  .edit-user-options {
    display: none;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .who-bar.editing .edit-user-options { display: flex; }

  .list-options {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .lineup-toggle {
    padding: 8px 14px;
    min-height: 40px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
  }

  .lineup-toggle[aria-pressed="true"] {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.25);
    color: var(--text);
  }

  .list-options-hint {
    color: var(--muted);
    font-size: 0.78rem;
  }

  .tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .tab {
    padding: 10px 18px;
    min-height: 44px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .tab:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #0e0e0e; font-weight: 600; }

  .day-section { margin-bottom: 2rem; }

  .day-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .sub-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 1rem 0 0.5rem;
    opacity: 0.6;
  }

  .artists { display: flex; flex-direction: column; gap: 6px; }

  .artist {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    column-gap: 12px;
    row-gap: 7px;
    align-items: center;
    padding: 11px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border-color 0.15s;
  }

  .artist.overlap {
    border-color: var(--overlap-border);
    background: var(--overlap-bg);
  }

  .artist.triple {
    border-color: var(--triple-border);
    background: var(--triple-bg);
  }

  .artist.editing {
    align-items: start;
  }

  .artist-name {
    flex: 0 1 auto;
    min-width: 0;
    font-size: 0.95rem;
    color: var(--text);
    font-weight: 500;
  }

  .artist-title {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1 1 auto;
    min-width: 0;
    flex-wrap: wrap;
  }

  .genre {
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    font-size: 0.66rem;
    line-height: 1.2;
    letter-spacing: 0.03em;
    text-transform: lowercase;
    white-space: nowrap;
  }

  .artist.overlap .artist-name { color: var(--overlap-text); }
  .artist.triple .artist-name { color: var(--triple-text); }

  .notes {
    display: flex;
    flex-direction: column;
    gap: 3px;
    grid-column: 1 / -1;
    justify-self: start;
    padding-left: 0;
  }

  .note {
    font-size: 0.78rem;
    font-style: italic;
    line-height: 1.35;
  }

  .note.s1 { color: color-mix(in srgb, var(--s1-text) 62%, transparent); }
  .note.s2 { color: color-mix(in srgb, var(--s2-text) 62%, transparent); }
  .note.s3 { color: color-mix(in srgb, var(--s3-text) 62%, transparent); }

  @supports not (color: color-mix(in srgb, white 50%, transparent)) {
    .note.s1 { color: rgba(240,136,168,0.65); }
    .note.s2 { color: rgba(122,170,240,0.65); }
    .note.s3 { color: rgba(94,201,138,0.65); }
  }

  .badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }

  .badge {
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .b1    { background: var(--s1-bg);      color: var(--s1-text);      border: 1px solid var(--s1-border); }
  .b2    { background: var(--s2-bg);      color: var(--s2-text);      border: 1px solid var(--s2-border); }
  .b3    { background: var(--s3-bg);      color: var(--s3-text);      border: 1px solid var(--s3-border); }
  .bmaybe{ background: var(--maybe-bg);   color: var(--maybe-text);   border: 1px solid var(--maybe-border); }
  .maybe-note { text-transform: lowercase; letter-spacing: 0; font-weight: 500; }

  .edit-controls {
    display: flex;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(0,0,0,0.18);
    flex-wrap: nowrap;
  }

  .edit-panel {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-left: auto;
  }

  .artist.editing .edit-panel {
    grid-column: 1 / -1;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    justify-content: space-between;
  }

  .edit-label {
    color: var(--muted);
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .vote-btn {
    padding: 6px 10px;
    min-width: 54px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    cursor: pointer;
    touch-action: manipulation;
  }

  .vote-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .vote-btn.yes.active { background: #102410; border-color: #3f8f4e; color: #82d991; }
  .vote-btn.maybe.active { background: #242018; border-color: #8a6a20; color: #d8b45c; }
  .vote-btn.no.active { background: #2a0a0a; border-color: #8a2020; color: #e05050; }

  .note-editor {
    flex: 1 1 240px;
  }

  .note-input {
    width: 100%;
    min-height: 38px;
    resize: vertical;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-family: inherit;
    font-size: 0.82rem;
  }

  .note-input:focus {
    outline: none;
    border-color: rgba(255,255,255,0.25);
  }

  .search-wrap {
    margin-bottom: 1.5rem;
  }

  .search-label {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  #artist-search {
    width: 100%;
    min-height: 44px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    -webkit-appearance: none;
    appearance: none;
    touch-action: manipulation;
  }

  #artist-search::placeholder { color: var(--muted); }

  #artist-search:focus {
    outline: none;
    border-color: rgba(255,255,255,0.2);
  }

  #no-results {
    display: none;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 1rem 0;
  }

  .add-section {
    display: none;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .add-section.show { display: block; }

  .add-section h3 {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.75rem;
  }

  .add-hint {
    color: var(--muted);
    font-size: 0.78rem;
    margin-bottom: 0.75rem;
  }

  .add-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .add-input,
  .add-select {
    min-height: 40px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #111;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
  }

  .add-input { flex: 1 1 180px; }

  .add-input:focus,
  .add-select:focus {
    outline: none;
    border-color: rgba(255,255,255,0.2);
  }

  .add-btn {
    min-height: 40px;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #0e0e0e;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
  }

  .save-banner {
    display: none;
    position: fixed;
    right: 1rem;
    bottom: 1rem;
    z-index: 10;
    align-items: center;
    gap: 10px;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.85rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .save-banner.show { display: flex; }

  .save-btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #0e0e0e;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    header { padding: 2rem 1rem 1.5rem; margin-bottom: 1.5rem; }
    .container { padding: 0 1rem; }
    .stats { grid-template-columns: 1fr; gap: 8px; margin-bottom: 1.5rem; }
    .stat { padding: 0.85rem 1rem; }
    .stat-num { font-size: 2rem; }
    .legend { gap: 0.75rem; margin-bottom: 1.5rem; }
    .who-bar { gap: 6px; margin-bottom: 1.25rem; }
    .who-btn { flex: 1 1 auto; padding: 8px 10px; }
    .edit-user-options { flex: 1 1 100%; }
    .list-options { align-items: stretch; flex-direction: column; }
    .lineup-toggle { width: 100%; }
    .tabs { gap: 6px; margin-bottom: 1.25rem; }
    .tab { font-size: 0.78rem; padding: 10px 14px; }
    .search-wrap { margin-bottom: 1.25rem; }
    .add-row { flex-direction: column; }
    .add-input, .add-select, .add-btn { width: 100%; }
    .day-label { font-size: 1.6rem; }
    .artist { grid-template-columns: 1fr; }
    .artist { padding: 12px; }
    .artist-title { flex: 1 1 100%; }
    .artist-name { font-size: 1rem; }
    .badges, .notes, .edit-panel { grid-column: 1; justify-content: flex-start; }
    .edit-panel { align-items: flex-start; flex-direction: column; gap: 6px; margin-left: 0; }
    .edit-controls { width: 100%; }
    .vote-btn { flex: 1; }
    .note-editor { width: 100%; }
    .save-banner { left: 1rem; right: 1rem; justify-content: space-between; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>OSL 2026<br><span class="accent">Who We're Seeing</span></h1>
    <p>Zach, Jonas, &amp; Zoe · Outside Lands · Golden Gate Park</p>
  </div>
</header>

<div class="container">
  <div class="stats" id="summary"></div>

  <div class="legend">
    <div class="leg"><div class="dot" style="background:#b38a22"></div> Zach <span class="leg-count" id="s1-count"></span></div>
    <div class="leg"><div class="dot" style="background:#2e4a8a"></div> Jonas <span class="leg-count" id="s2-count"></span></div>
    <div class="leg"><div class="dot" style="background:#1e6040"></div> Zoe <span class="leg-count" id="s3-count"></span></div>
    <div class="leg"><div class="dot" style="background:#888"></div> Maybe (solo)</div>
  </div>

  <div class="tabs" id="tabs">
    <button type="button" class="tab active" data-filter="all">All days</button>
    <button type="button" class="tab" data-filter="fri">Friday</button>
    <button type="button" class="tab" data-filter="sat">Saturday</button>
    <button type="button" class="tab" data-filter="sun">Sunday</button>
    <button type="button" class="tab" data-filter="overlap">Overlaps only</button>
  </div>

  <div class="list-options">
    <button type="button" class="lineup-toggle" id="lineup-toggle" aria-pressed="false">Show unpicked artists</button>
    <button type="button" class="lineup-toggle" id="genre-toggle" aria-pressed="true">Hide genres</button>
    <span class="list-options-hint">Toggle unpicked artists or genre tags.</span>
  </div>

  <div class="search-wrap">
    <label class="search-label" for="artist-search">Search artists</label>
    <input type="search" id="artist-search" placeholder="Filter by name…" autocomplete="off" autocapitalize="off" spellcheck="false" enterkeyhint="search">
  </div>

  <div class="who-bar" id="who-bar" aria-label="Edit picks">
    <button type="button" class="who-btn edit-mode-toggle" id="edit-mode-toggle" aria-pressed="false">Edit mode: off</button>
    <div class="edit-user-options" id="edit-user-options">
      <span class="who-label">Tap as:</span>
      <button type="button" class="who-btn" data-user="1">Zach</button>
      <button type="button" class="who-btn" data-user="2">Jonas</button>
      <button type="button" class="who-btn" data-user="3">Zoe</button>
    </div>
  </div>

  <div class="add-section" id="add-section">
    <h3 id="add-title">Update an artist</h3>
    <p class="add-hint" id="add-hint">Start typing an artist from the lineup.</p>
    <div class="add-row">
      <input class="add-input" id="add-name" list="lineup-artists" placeholder="Artist name" autocomplete="off">
      <datalist id="lineup-artists"></datalist>
      <select class="add-select" id="add-status" aria-label="Status">
        <option value="yes">Yes</option>
        <option value="maybe">Maybe</option>
        <option value="no">No</option>
      </select>
      <button type="button" class="add-btn" id="add-artist">Update</button>
    </div>
  </div>

  <div id="list"></div>
  <p id="no-results" role="status">No results.</p>
</div>

<div class="save-banner" id="save-banner" role="status">
  <span>Save your changes?</span>
  <button type="button" class="save-btn" id="save-changes">Save</button>
</div>

<script>
const DEFAULT_ARTISTS = [
  // FRIDAY (poster order)
  { name:"Charli XCX", g:"hyperpop / dance pop",                         day:"fri", s1:true,  s2:true,  s3:true,  pos:1  },

const STORAGE_KEY = 'osl2026-overlap-picks';
const dayLabels = { fri:"Friday", sat:"Saturday", sun:"Sunday" };
// Sibling 1 = Zach, 2 = Jonas, 3 = Zoe
const S1 = "Zach", S2 = "Jonas", S3 = "Zoe";
const SIBLINGS = [
  { id: 1, name: S1 },
  { id: 2, name: S2 },
  { id: 3, name: S3 },
];

function normalizeName(value) {
  return String(value)
    .trim()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[ł]/g, 'l')
    .replace(/[ø]/g, 'o')
    .replace(/[’‘]/g, "'")
    .replace(/[^a-z0-9]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

const ARTIST_ALIASES = {
  'griztronics': normalizeName('GRiZTRONICS (Subtronics + GRiZ)'),
  'hyperbeam': normalizeName('Odd Mob & OMNOM present HYPERBEAM'),
  'odd mob omnom present hyperbeam': normalizeName('Odd Mob & OMNOM present HYPERBEAM'),
  'laszewo': normalizeName('Łaszewo'),
  'malcom todd': normalizeName('Malcolm Todd'),
  'rufus du sol': normalizeName('RÜFÜS DU SOL'),
};

const artistKey = name => ARTIST_ALIASES[normalizeName(name)] || normalizeName(name);

function legacyNoteOwner(a) {
  const note = String(a.note || '').toLowerCase();
  if (note.includes('zoe')) return 3;
  if (note.includes('jonas')) return 2;
  if (a.s3 || a.m3) return 3;
  if (a.s2 || a.m2) return 2;
  if (a.s1 || a.m1) return 1;
  return 2;
}

function cleanLegacyNote(note) {
  return String(note || '')
    .replace(/^jonas\s*:?\s*/i, '')
    .replace(/^zoe\s*:?\s*/i, '')
    .replace(/^zach\s*:?\s*/i, '')
    .replace(/^maybe\s*/i, '')
    .trim();
}

const loadArtists = () => {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const savedArtists = JSON.parse(saved);
      const merged = DEFAULT_ARTISTS.map(a => ({...a}));
      const byName = new Map(merged.map((a, i) => [artistKey(a.name), i]));
      savedArtists.forEach(savedArtist => {
        const idx = byName.get(artistKey(savedArtist.name));
        if (idx === undefined) {
          merged.push({...savedArtist});
          return;
        }
        ['s1','s2','s3','m1','m2','m3','n1','n2','n3'].forEach(key => {
          if (key in savedArtist) merged[idx][key] = savedArtist[key];
        });
        if (savedArtist.note) {
          const owner = legacyNoteOwner(savedArtist);
          const key = 'n' + owner;
          if (!merged[idx][key]) merged[idx][key] = cleanLegacyNote(savedArtist.note);
        }
      });
      return merged;
    }
  } catch (e) {}
  return DEFAULT_ARTISTS.map(a => ({...a}));
};
let artists = loadArtists();
let editMode = false;
let currentUser = null;
let showUnpicked = false;
let showGenres = true;
const overlapFilters = { triple: false, two: false };

const hasMaybe = a => [a.m1, a.m2, a.m3].some(Boolean);
const isMaybeOnly = a => !a.s1 && !a.s2 && !a.s3 && hasMaybe(a);
const allThreeOnRow = a => a.s1 && a.s2 && a.s3;
const confirmedCount = a => [a.s1, a.s2, a.s3].filter(Boolean).length;
const sharedConfirmedOnRow = a => confirmedCount(a) >= 2;
const overlapTileFilterActive = () => overlapFilters.triple || overlapFilters.two;
const matchesOverlapTileFilter = a => {
  if (!overlapTileFilterActive()) return true;
  const count = confirmedCount(a);
  return (overlapFilters.triple && count === 3) || (overlapFilters.two && count === 2);
};
const multiSiblingOnRow = a => {
  const n = [a.s1, a.s2, a.s3].filter(Boolean).length;
  return n >= 2 || (a.m1 && (a.s2 || a.s3)) || (a.m2 && (a.s1 || a.s3)) || (a.m3 && (a.s1 || a.s2));
};
/** Lowest sibling # on row (1=Zach/s1, 2=Jonas, 3=Zoe); multi-sibling → min rank */
const siblingRank = a => {
  const ranks = [];
  if (a.s1 || a.m1) ranks.push(1);
  if (a.s2 || a.m2) ranks.push(2);
  if (a.s3 || a.m3) ranks.push(3);
  return ranks.length ? Math.min(...ranks) : 99;
};
const sortSingles = (a, b) => {
  const aMix = multiSiblingOnRow(a) ? 0 : 1;
  const bMix = multiSiblingOnRow(b) ? 0 : 1;
  return aMix - bMix || siblingRank(a) - siblingRank(b) || a.pos - b.pos;
};
const sortMaybes = (a, b) => siblingRank(a) - siblingRank(b) || a.pos - b.pos;
const sharedPairRank = a => {
  if (a.s1 && a.s2) return 12;
  if (a.s1 && a.s3) return 13;
  if (a.s2 && a.s3) return 23;
  return 99;
};
const sortShared = (a, b) => sharedPairRank(a) - sharedPairRank(b) || a.pos - b.pos;

const countSiblingsOnRow = a =>
  [a.s1 || a.m1, a.s2 || a.m2, a.s3 || a.m3].filter(Boolean).length;
const hasAnyInterest = a => [a.s1, a.s2, a.s3, a.m1, a.m2, a.m3].some(Boolean);

/** Grey maybe when solo interest on row (one sibling flag total, no other s* yes). */
const useGreyMaybe = (a, sib) => {
  if (!a['m' + sib]) return false;
  if (a['s' + sib]) return false;
  const otherYes =
    (sib !== 1 && a.s1) || (sib !== 2 && a.s2) || (sib !== 3 && a.s3);
  if (otherYes) return false;
  return countSiblingsOnRow(a) === 1;
};

const maybeBadgeClass = (a, sib) => (useGreyMaybe(a, sib) ? 'bmaybe' : 'b' + sib);
const escapeHtml = value => String(value).replace(/[&<>"']/g, ch => ({
  '&': '&amp;',
  '<': '&lt;',
  '>': '&gt;',
  '"': '&quot;',
  "'": '&#39;',
}[ch]));

function findLineupArtist(name) {
  const normalized = artistKey(name);
  if (!normalized) return null;
  return artists.find(a => artistKey(a.name) === normalized)
    || DEFAULT_ARTISTS.find(a => artistKey(a.name) === normalized)
    || null;
}

function buildLineupOptions() {
  const options = [...new Map([...artists, ...DEFAULT_ARTISTS].map(a => [artistKey(a.name), a.name])).values()]
    .sort((a, b) => a.localeCompare(b));
  document.getElementById('lineup-artists').innerHTML = options
    .map(name => `<option value="${escapeHtml(name)}"></option>`)
    .join('');
}

function updateAddHint() {
  const hint = document.getElementById('add-hint');
  const name = document.getElementById('add-name').value;
  const match = findLineupArtist(name);
  if (!name.trim()) {
    hint.textContent = 'Start typing an artist from the lineup.';
  } else if (match) {
    hint.textContent = `Day: ${dayLabels[match.day]}`;
  } else {
    hint.textContent = 'Choose an artist from the lineup suggestions so the day can be filled automatically.';
  }
}

const getStatus = (a, sib) => a['s' + sib] ? 'yes' : a['m' + sib] ? 'maybe' : 'no';

function activeFilter() {
  const active = document.querySelector('.tab.active');
  return active ? active.dataset.filter : 'all';
}

function renderCurrent() {
  buildSummary();

  overlapFilters[kind] = !overlapFilters[kind];

  const toggle = document.getElementById('edit-mode-toggle');

    btn.classList.toggle('active', editMode && Number(btn.dataset.user) === currentUser);
  });
  document.getElementById('add-section').classList.toggle('show', editMode);

function markDirty() {
  document.getElementById('save-banner').classList.add('show');
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(artists));
    document.getElementById('save-banner').classList.remove('show');
  } catch (e) {
    alert('Could not save changes in this browser.');
  }
}

function setEditMode(nextMode) {
  editMode = nextMode;
  if (editMode && !currentUser) currentUser = 1;
  updateEditControls();
  renderCurrent();
}

function setCurrentUser(userId) {
  currentUser = Number(userId);
  updateEditControls();
  renderCurrent();
}

function setVote(idx, sib, status) {
  const artist = artists[idx];
  if (!artist) return;
  const current = getStatus(artist, sib);
  artist['s' + sib] = status === 'yes' && current !== 'yes';
  artist['m' + sib] = status === 'maybe' && current !== 'maybe';
  markDirty();
  renderCurrent();
}

function setNote(idx, sib, note) {
  const artist = artists[idx];
  if (!artist) return;
  const key = 'n' + sib;
  const cleaned = note.trim();
  if (cleaned) artist[key] = cleaned;
  else delete artist[key];
  markDirty();
  renderCurrent();
}

function addArtist() {
  if (!editMode || !currentUser) return;
  const nameInput = document.getElementById('add-name');
  const name = nameInput.value.trim();
  if (!name) return;

  const lineupArtist = findLineupArtist(name);
  if (!lineupArtist) {
    alert('Choose an artist from the lineup suggestions so the day can be filled in automatically.');
    return;
  }

  const day = lineupArtist.day;
  const status = document.getElementById('add-status').value;
  const existingIndex = artists.findIndex(a => (
    a.day === day && artistKey(a.name) === artistKey(lineupArtist.name)
  ));
  const idx = existingIndex >= 0 ? existingIndex : artists.length;

  if (existingIndex < 0) {
    const maxPos = Math.max(0, ...artists.filter(a => a.day === day).map(a => a.pos || 0));
    artists.push({ name: lineupArtist.name, day, s1:false, s2:false, s3:false, pos:maxPos + 1 });
  }

  artists[idx]['s' + currentUser] = status === 'yes';
  artists[idx]['m' + currentUser] = status === 'maybe';
  nameInput.value = '';
  updateAddHint();
  buildLineupOptions();
  markDirty();
  renderCurrent();
}

let searchQuery = '';

function matchesSearch(a) {
  const q = searchQuery.trim().toLowerCase();
  if (!q) return true;
  return a.name.toLowerCase().includes(q);
}

function buildNotes(a) {
  const notes = SIBLINGS
    .filter(sib => a['n' + sib.id])
    .map(sib => `<span class="note s${sib.id}">${sib.name}: ${escapeHtml(a['n' + sib.id])}</span>`);
  if (a.note && !notes.length) {
    const owner = legacyNoteOwner(a);
    notes.push(`<span class="note s${owner}">${SIBLINGS[owner - 1].name}: ${escapeHtml(cleanLegacyNote(a.note))}</span>`);
  }
  return notes.length ? `<div class="notes">${notes.join('')}</div>` : '';
}

function artistGenre(a) {
  return a.g || DEFAULT_ARTISTS.find(base => artistKey(base.name) === artistKey(a.name))?.g || '';
}

function buildRow(a) {
  const el = document.createElement('div');
  el.className = 'artist'
    + (sharedConfirmedOnRow(a) ? ' overlap' : '')
    + (allThreeOnRow(a) ? ' triple' : '')
    + (editMode ? ' editing' : '');

  const parts = [];
  if (a.s1) parts.push(`<span class="badge b1">${S1}</span>`);
  if (a.s2) parts.push(`<span class="badge b2">${S2}</span>`);
  if (a.s3) parts.push(`<span class="badge b3">${S3}</span>`);
  if (a.m1) {
    const t = `${S1} <span class="maybe-note">(maybe)</span>`;
    parts.push(`<span class="badge ${maybeBadgeClass(a, 1)}">${t}</span>`);
  }
  if (a.m2) {
    const t = `${S2} <span class="maybe-note">(maybe)</span>`;
    parts.push(`<span class="badge ${maybeBadgeClass(a, 2)}">${t}</span>`);
  }
  if (a.m3) {
    const t = `${S3} <span class="maybe-note">(maybe)</span>`;
    parts.push(`<span class="badge ${maybeBadgeClass(a, 3)}">${t}</span>`);
  }

  const badges = parts.join(' ');
  const genre = showGenres ? artistGenre(a) : '';
  el.innerHTML = `<div class="artist-title"><span class="artist-name">${escapeHtml(a.name)}</span>${genre ? `<span class="genre">${escapeHtml(genre)}</span>` : ''}</div><div class="badges">${badges}</div>${buildNotes(a)}`;

  if (editMode && currentUser && Number.isInteger(a._idx)) {
    const editPanel = document.createElement('div');
    editPanel.className = 'edit-panel';
    editPanel.innerHTML = '<span class="edit-label">Your pick</span>';

    const controls = document.createElement('div');
    controls.className = 'edit-controls';
    [
      ['yes', 'Yes'],
      ['maybe', 'Maybe'],
      ['no', 'No'],
    ].forEach(([status, label]) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = `vote-btn ${status}` + (getStatus(a, currentUser) === status ? ' active' : '');
      btn.textContent = label;
      btn.addEventListener('click', () => setVote(a._idx, currentUser, status));
      controls.appendChild(btn);
    });
    editPanel.appendChild(controls);

    const noteEditor = document.createElement('div');
    noteEditor.className = 'note-editor';
    noteEditor.innerHTML = `<textarea class="note-input" rows="1" placeholder="Add a note for ${SIBLINGS[currentUser - 1].name}">${escapeHtml(a['n' + currentUser] || '')}</textarea>`;
    const noteInput = noteEditor.querySelector('.note-input');
    noteInput.addEventListener('change', () => setNote(a._idx, currentUser, noteInput.value));
    noteInput.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') noteInput.blur();
    });
    editPanel.appendChild(noteEditor);
    el.appendChild(editPanel);
  }

  return el;
}

function addSubLabel(container, text) {
  const d = document.createElement('div');
  d.className = 'sub-label';
  d.textContent = text;
  container.appendChild(d);
}

function show(filter, tabBtn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (tabBtn) tabBtn.classList.add('active');
  const list = document.getElementById('list');
  list.innerHTML = '';

  const days = (filter === 'all' || filter === 'overlap') ? ['fri','sat','sun'] : [filter];
  let anyContent = false;

  days.forEach(day => {
    let pool = artists.map((a, i) => ({...a, _idx:i})).filter(a => a.day === day);
    if (filter === 'overlap') pool = pool.filter(sharedConfirmedOnRow);
    pool = pool.filter(matchesOverlapTileFilter);
    pool = pool.filter(matchesSearch);
    if (!pool.length) return;

    const section = document.createElement('div');
    section.className = 'day-section';

    const lbl = document.createElement('div');
    lbl.className = 'day-label';
    lbl.textContent = dayLabels[day];
    section.appendChild(lbl);

    const artDiv = document.createElement('div');
    artDiv.className = 'artists';

    const triples   = pool.filter(allThreeOnRow).sort((a,b) => a.pos - b.pos);
    const overlaps  = pool.filter(a => sharedConfirmedOnRow(a) && !allThreeOnRow(a)).sort(sortShared);
    const singles   = pool.filter(a => (a.s1 || a.s2 || a.s3) && !sharedConfirmedOnRow(a)).sort(sortSingles);
    const maybes    = pool.filter(isMaybeOnly).sort(sortMaybes);
    const lineup    = showUnpicked ? pool.filter(a => !hasAnyInterest(a)).sort((a,b) => a.pos - b.pos) : [];
    let sectionContent = false;

    if (triples.length) {
      if (filter !== 'overlap') addSubLabel(artDiv, '↓ all three going');
      triples.forEach(a => artDiv.appendChild(buildRow(a)));
      sectionContent = true;
    }
    if (overlaps.length) {
      if (filter !== 'overlap') addSubLabel(artDiv, '↓ shared picks');
      overlaps.forEach(a => artDiv.appendChild(buildRow(a)));
      sectionContent = true;
    }
    if (singles.length) {
      addSubLabel(artDiv, singles.some(a => a.s1) ? '↓ not everyone' : '↓ one of them');
      singles.forEach(a => artDiv.appendChild(buildRow(a)));
      sectionContent = true;
    }
    if (maybes.length) {
      addSubLabel(artDiv, '↓ maybe');
      maybes.forEach(a => artDiv.appendChild(buildRow(a)));
      sectionContent = true;
    }
    if (lineup.length && filter !== 'overlap') {
      addSubLabel(artDiv, '↓ lineup');
      lineup.forEach(a => artDiv.appendChild(buildRow(a)));
      sectionContent = true;
    }

    if (!sectionContent) return;
    anyContent = true;
    section.appendChild(artDiv);
    list.appendChild(section);
  });

  const noRes = document.getElementById('no-results');
  noRes.textContent = overlapTileFilterActive()
    ? 'No artists match these overlap tiles.'
    : searchQuery.trim()
    ? 'No artists match your search.'
    : 'Nothing here for this filter.';
  noRes.style.display = anyContent ? 'none' : 'block';
}

function buildSummary() {
  const triple = artists.filter(allThreeOnRow).length;
  const twoOfThree = artists.filter(a => confirmedCount(a) === 2).length;
  const s1     = artists.filter(a => a.s1).length;
  const s2     = artists.filter(a => a.s2).length;
  const s3     = artists.filter(a => a.s3).length;
  const grid = document.getElementById('summary');
  grid.innerHTML = '';
  [
    [triple, 'Three-person overlaps', 'triple', 'triple'],
    [twoOfThree, 'Two-person overlaps', 'two-overlap', 'two'],
  ].forEach(([n,l,c,k]) => {
    const s = document.createElement('button');
    s.type = 'button';
    s.className = `stat ${c}`;
    s.dataset.overlapFilter = k;
    s.setAttribute('aria-pressed', String(overlapFilters[k]));
    s.title = `Toggle ${l.toLowerCase()}`;
    s.innerHTML = `<div class="stat-num">${n}</div><div class="stat-label">${l}</div>`;
    grid.appendChild(s);
  });
  document.getElementById('s1-count').textContent = `(${s1})`;
  document.getElementById('s2-count').textContent = `(${s2})`;
  document.getElementById('s3-count').textContent = `(${s3})`;
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  show(btn.dataset.filter, btn);
});

document.getElementById('summary').addEventListener('click', e => {
  const btn = e.target.closest('[data-overlap-filter]');
  if (!btn) return;
  toggleOverlapFilter(btn.dataset.overlapFilter);
});

document.getElementById('edit-mode-toggle').addEventListener('click', () => {
  setEditMode(!editMode);
});

document.getElementById('edit-user-options').addEventListener('click', e => {
  const btn = e.target.closest('.who-btn[data-user]');
  if (!btn) return;
  setCurrentUser(btn.dataset.user);
});

document.getElementById('artist-search').addEventListener('input', e => {
  searchQuery = e.target.value;
  const active = document.querySelector('.tab.active');
  show(active ? active.dataset.filter : 'all', active);
});

document.getElementById('add-artist').addEventListener('click', addArtist);
document.getElementById('add-name').addEventListener('input', updateAddHint);
document.getElementById('add-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addArtist();
});
document.getElementById('save-changes').addEventListener('click', saveToStorage);
document.getElementById('lineup-toggle').addEventListener('click', () => {
  showUnpicked = !showUnpicked;
  updateLineupToggle();
  renderCurrent();
});
document.getElementById('genre-toggle').addEventListener('click', () => {
  showGenres = !showGenres;
  updateGenreToggle();
  renderCurrent();
});

buildLineupOptions();
updateAddHint();
updateLineupToggle();
updateGenreToggle();
updateEditControls();
buildSummary();
show('all', document.querySelector('.tab[data-filter="all"]'));
</script>
</body>
</html>
